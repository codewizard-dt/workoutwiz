name: Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  IMAGE: ${{ github.event.repository.name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # Skips automatically until a root-level Dockerfile exists, so this template
    # stays green on repos that don't build a container yet. When the build job
    # skips, the dependent deploy job skips too (neither fails).
    # NOTE: update the guard path if your Dockerfile lives elsewhere,
    # e.g. hashFiles('backend/Dockerfile.prod') for a multi-image repo.
    if: ${{ hashFiles('Dockerfile') != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Get version
        id: version
        run: |
          if [ -f package.json ]; then
            echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # TODO: Adjust context and dockerfile paths for your project.
      # For multi-image repos, convert this to a matrix strategy.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    # TODO: Configure your runner. Choose one:
    #   Option A — Self-hosted runner on deploy server (see .scripts/setup-runner.sh):
    #     runs-on: [self-hosted, <your-label>]
    #   Option B — GitHub-hosted runner + SSH (add SSH_HOST, SSH_USER, SSH_KEY,
    #              DEPLOY_PATH as repository secrets, then replace the deploy step below)
    runs-on: ubuntu-latest
    steps:
      # TODO: Replace with your deploy mechanism.
      # Option A (self-hosted runner already on deploy server):
      #   - name: Pull and restart
      #     run: |
      #       cd /opt/your-app
      #       docker compose pull
      #       docker compose up -d --wait
      #
      # Option B (GitHub-hosted runner + SSH):
      #   - uses: appleboy/ssh-action@v1
      #     with:
      #       host: ${{ secrets.SSH_HOST }}
      #       username: ${{ secrets.SSH_USER }}
      #       key: ${{ secrets.SSH_KEY }}
      #       script: |
      #         cd ${{ secrets.DEPLOY_PATH }}
      #         docker compose pull
      #         docker compose up -d --wait
      - name: Deploy
        run: echo "TODO: Configure deploy step — see comments above."