name: Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: workoutwiz-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile.prod
          - image: workoutwiz-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.prod
          - image: workoutwiz-caddy
            context: .
            dockerfile: ./Dockerfile.caddy

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Get version
        id: version
        run: |
          echo "VERSION=$(grep '^version' backend/pyproject.toml | head -1 | cut -d'"' -f2)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: [self-hosted, droplet]
    steps:
      - name: Pull new images and restart stack
        working-directory: /opt/workoutwiz
        run: |
          docker compose pull
          docker compose up -d --wait
