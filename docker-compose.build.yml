# Local dev overlay: builds images from source instead of pulling from GHCR.
# Usage: docker compose -f docker-compose.yml -f docker-compose.build.yml up --build -d --wait
#        (or simply: make dev)
#
# Dependency changes (package.json / pyproject.toml) are handled inside each
# container by docker-entrypoint.sh — no Compose Watch required.
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - /app/.venv # shields the container's venv from the host bind mount

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      # Vite dev server must listen on port 80 to match the base compose port
      # mapping (${FRONTEND_PORT:-3000}:80). PROXY_TARGET is server-side in
      # Vite's Node process so it must use the compose service name, not localhost.
      PORT: 80
      PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules # shields the container's node_modules from the host bind mount
