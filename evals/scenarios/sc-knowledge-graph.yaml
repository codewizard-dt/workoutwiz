- id: "sc-kg-001"
  query: "I have a knee injury. Build me a workout that avoids leg exercises."
  expected_tools: [knowledge_graph]
  category: knowledge_graph
  subcategory: injury_avoidance
  difficulty: straightforward
  must_contain: ["excluded due to injury constraints"]
  must_not_contain: ["I don't know", "I cannot", "couldn't build"]

