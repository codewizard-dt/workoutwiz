# Workout generation category scenarios — 9 total, 3 per difficulty band
# Covers: muscle_group, program_design, underspecified, goal_based,
#         equipment_constraint, special_population, advanced

# --- straightforward ---

- id: "sc-wg-001"
  query: "Give me a 45-minute leg workout"
  expected_tools:
    - knowledge_graph
  category: knowledge_graph
  subcategory: muscle_group
  difficulty: straightforward
  must_contain:
    - "sets"
    - "reps"
  must_not_contain:
    - "I don't know"
    - "I cannot"

