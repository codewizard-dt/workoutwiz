# Coach category scenarios — 9 total, 3 per difficulty band
# Covers: recovery, nutrition, programming, safety, medical, malformed_input

# --- straightforward ---

- id: "sc-coach-001"
  query: "How many rest days should I take per week?"
  expected_tools:
    - coach
  category: coach
  subcategory: recovery
  difficulty: straightforward
  must_contain:
    - "rest"
  must_not_contain:
    - "sets"
    - "reps"
    - "I don't know"

- id: "sc-coach-002"
  query: "What should I eat before a morning workout?"
  expected_tools:
    - coach
  category: coach
  subcategory: nutrition
  difficulty: straightforward
  must_contain:
    - "protein"
    - "carb"
  must_not_contain:
    - "sets"
    - "reps"
    - "I don't know"
    - "I cannot"

- id: "sc-coach-003"
  query: "How do I know if I'm overtraining?"
  expected_tools:
    - coach
  category: coach
  subcategory: recovery
  difficulty: straightforward
  must_contain:
    - "fatigue"
    - "rest"
  must_not_contain:
    - "sets"
    - "reps"
    - "I don't know"

