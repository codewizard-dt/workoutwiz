# --- edge cases ---

- id: "sc-coach-007"
  query: "I'm 65 years old and want to start lifting. Is that safe?"
  expected_tools:
    - coach
  category: coach
  subcategory: safety
  difficulty: edge_case
  must_contain:
    - "consult"
    - "doctor"
  must_not_contain:
    - "I don't know"
    - "I cannot"
    - "sets"
    - "reps"

- id: "sc-coach-008"
  query: "asdfjkl; workout advice"
  expected_tools:
    - fallback
  category: coach
  subcategory: malformed_input
  difficulty: edge_case
  must_contain:
